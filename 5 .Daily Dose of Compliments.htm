<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Dose of Compliments ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #bc13fe;
            --secondary-glow: #00ffff;
            --accent-pink: #ff00ff;
            --text-color: #ffffff;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Poppins', sans-serif;
            background: #020205;
            color: var(--text-color);
            overflow: hidden;
            cursor: none;
        }

        #cursor {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 15px var(--secondary-glow), 0 0 30px var(--primary-glow);
            transition: transform 0.1s ease;
        }

        /* --- SPACE BACKGROUND --- */
        #universe {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #11112b 0%, #020205 100%);
        }

        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            z-index: -1;
            animation: pulse 10s infinite alternate ease-in-out;
        }
        .nebula-1 { width: 600px; height: 600px; background: var(--primary-glow); top: -10%; left: -10%; }
        .nebula-2 { width: 600px; height: 600px; background: var(--secondary-glow); bottom: -10%; right: -10%; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1.3); opacity: 0.6; }
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* --- CONTENT --- */
        .main-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
            z-index: 10;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, var(--secondary-glow), var(--accent-pink), var(--primary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--primary-glow));
        }

        .compliment-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 2px solid rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 40px;
            width: 90%;
            max-width: 600px;
            min-height: 200px;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            position: relative;
            transition: 0.3s;
        }

        #complimentText {
            font-size: 1.6rem;
            font-weight: 300;
            line-height: 1.5;
            opacity: 0;
            transition: opacity 0.5s ease;
            text-shadow: 0 0 10px var(--secondary-glow);
        }

        .btn-generate {
            margin-top: 40px;
            padding: 15px 40px;
            background: linear-gradient(45deg, var(--primary-glow), var(--accent-pink));
            border: none;
            border-radius: 50px;
            color: white;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 0 15px var(--accent-pink);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-generate:hover {
            transform: scale(1.1);
            box-shadow: 0 0 25px var(--accent-pink);
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: var(--glass);
            border: 1px solid white;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
            z-index: 100;
        }
        .back-btn:hover { background: white; color: black; }

        /* Simple animation for text appear */
        .fade-in {
            opacity: 1 !important;
        }
    </style>
</head>
<body>

    <a href="C:\Users\Sai\Desktop\Finals\1. Homepage.html" class="back-btn">← Back to Sanctuary</a>
    <div id="cursor"></div>

    <div id="universe">
        <div class="nebula nebula-1"></div>
        <div class="nebula nebula-2"></div>
        <div id="star-field"></div>
    </div>

    <div class="main-container">
        <h1>Daily Dose of Compliments ✨</h1>
        <p style="opacity: 0.7; margin-bottom: 30px;">Click below whenever you need a little reminder of how amazing you are.</p>

        <div class="compliment-card">
            <div id="complimentText">Click the button to receive a cosmic compliment...</div>
        </div>

        <button class="btn-generate" onclick="giveCompliment()">Generate Compliment 💖</button>
    </div>

    <script>
        // --- CURSOR ---
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // --- STARS ---
        function createStars() {
            const field = document.getElementById('star-field');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.top = Math.random() * 100 + 'vh';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
                field.appendChild(star);
            }
        }
        createStars();

        // --- COMPLIMENT LIST (52 unique lines) ---
        const allCompliments = [
            "I love how you can make me smile even on my worst days.",
            "I truly admire the kindness you show to everyone around you.",
            "I appreciate the way you listen when I have something on my mind.",
            "I think the way you think is honestly fascinating.",
            "I love your sense of humor; you have the best laugh.",
            "I really admire your strength and how you handle things.",
            "I appreciate how you always know exactly what to say to make me feel better.",
            "I love how passionate you get when talking about things you love.",
            "I think you have one of the most beautiful souls I've ever met.",
            "I appreciate your honesty and the way you stay true to yourself.",
            "I love how you make the world feel a little bit brighter just by being in it.",
            "I admire your intelligence and the way you see the world.",
            "I appreciate the little things you do that show you care.",
            "I love your energy; it's so refreshing and positive.",
            "I think you're incredibly brave for being exactly who you are.",
            "I appreciate how you challenge me to be a better person.",
            "I love the way you handle every situation with such grace.",
            "I admire your patience, especially with me!",
            "I think your perspective on life is so inspiring.",
            "I love how you are unapologetically yourself.",
            "I appreciate the comfort I feel whenever I'm talking to you.",
            "I admire how hard you work for the things you want.",
            "I think you have a wonderful heart and a beautiful mind.",
            "I love how you find joy in the smallest, simplest things.",
            "I appreciate your ability to see the good in people.",
            "I think the world would be a much better place if everyone was like you.",
            "I love how you are always there for the people who matter.",
            "I admire the way you stay positive even when things get tough.",
            "I appreciate the unique way you look at things.",
            "I love that I can be my complete self around you.",
            "I think you are more capable than you give yourself credit for.",
            "I appreciate how you notice things that others usually miss.",
            "I love your spirit and your curiosity about the world.",
            "I admire your loyalty and the way you stand by your friends.",
            "I think you bring a special kind of magic wherever you go.",
            "I appreciate your wisdom and the advice you give.",
            "I love how you can turn a boring moment into a great memory.",
            "I admire the way you carry yourself with such confidence.",
            "I think your empathy for others is truly a gift.",
            "I appreciate how you always encourage me to keep going.",
            "I love the way your mind works—it's just brilliant.",
            "I admire how you never give up on the people you care about.",
            "I think you are one of the most genuine people I've ever known.",
            "I appreciate your gentleness and your kindness.",
            "I love how you can make me feel seen and understood.",
            "I admire your ambition and your drive to succeed.",
            "I think you have an incredible amount of poise.",
            "I appreciate the warmth and light you bring into my life.",
            "I love how you make me feel safe and happy.",
            "I admire your creativity and the way you express yourself.",
            "I think you are a rare and precious person.",
            "I appreciate you simply for being you."
        ];

        // --- SHUFFLE SYSTEM ---
        let deck = [];

        function shuffleDeck() {
            // Copy the original array and shuffle it randomly
            deck = [...allCompliments].sort(() => Math.random() - 0.5);
        }

        function giveCompliment() {
            const textElement = document.getElementById('complimentText');
            
            // Reset animation
            textElement.classList.remove('fade-in');
            
            // Force a small delay for the animation to restart
            setTimeout(() => {
                // If the deck is empty, reshuffle it
                if (deck.length === 0) {
                    shuffleDeck();
                }

                // Pick the top compliment from the shuffled deck
                const compliment = deck.pop();
                
                textElement.innerText = compliment;
                textElement.classList.add('fade-in');
            }, 200);
        }

        // Initial shuffle
        shuffleDeck();
    </script>
</body>
</html>
