<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Cosmic Gallery ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-glow: #bc13fe;
            --secondary-glow: #00ffff;
            --accent-pink: #ff00ff;
            --text-color: #ffffff;
            --glass: rgba(255, 255, 255, 0.07);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            min-height: 100vh;
            font-family: 'Poppins', sans-serif;
            background: #020205;
            color: var(--text-color);
            overflow-x: hidden;
            cursor: none;
        }

        #cursor {
            width: 12px;
            height: 12px;
            background: white;
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            box-shadow: 0 0 15px var(--secondary-glow), 0 0 30px var(--primary-glow);
            transition: transform 0.1s ease;
        }

        /* --- BACKGROUND --- */
        #space-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #11112b 0%, #020205 100%);
        }

        .nebula {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.3;
            z-index: -1;
            animation: pulse 10s infinite alternate ease-in-out;
        }
        .nebula-1 { width: 600px; height: 600px; background: var(--primary-glow); top: -10%; left: -10%; }
        .nebula-2 { width: 600px; height: 600px; background: var(--secondary-glow); bottom: -10%; right: -10%; }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.3; }
            100% { transform: scale(1.3); opacity: 0.6; }
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* --- SELECTION SCREEN --- */
        #selection-screen {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
            transition: 0.8s ease;
        }

        .selection-title {
            font-family: 'Dancing Script', cursive;
            font-size: 3.5rem;
            margin-bottom: 50px;
            background: linear-gradient(to right, var(--secondary-glow), var(--accent-pink), var(--primary-glow));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--primary-glow));
        }

        .choice-btn {
            padding: 20px 40px;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
            text-decoration: none;
            color: white;
            margin: 20px;
            display: block;
            text-align: center;
        }

        .btn-holy {
            background: linear-gradient(45deg, var(--secondary-glow), var(--primary-glow));
            box-shadow: 0 0 20px var(--secondary-glow);
            border: 2px solid white;
        }

        .btn-holy:hover {
            transform: scale(1.1);
            box-shadow: 0 0 40px var(--secondary-glow);
        }

        /* --- THE SECRET HELL LINK --- */
        .secret-link {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 0.8rem;
            color: #444;
            text-decoration: none;
            cursor: pointer;
            transition: 0.3s;
            opacity: 0.5;
        }

        .secret-link:hover {
            color: red;
            opacity: 1;
            text-shadow: 0 0 10px red;
        }

        /* --- GALLERY VIEW --- */
        #gallery-view {
            display: none;
            padding: 60px 20px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .gallery-title {
            font-family: 'Dancing Script', cursive;
            font-size: 3rem;
            margin-bottom: 40px;
            text-shadow: 0 0 15px var(--primary-glow);
        }

        .gallery-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 40px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .polaroid {
            background: white;
            padding: 15px 15px 40px 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            max-width: 250px;
        }

        .polaroid img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border: 1px solid #ddd;
        }

        .polaroid p {
            color: #333;
            font-family: 'Dancing Script', cursive;
            font-size: 1.4rem;
            text-align: center;
            margin: 15px 0 0 0;
        }

        .polaroid:nth-child(odd) { transform: rotate(-3deg); }
        .polaroid:nth-child(even) { transform: rotate(3deg); }

        .polaroid:hover {
            transform: scale(1.1) rotate(0deg) translateY(-10px);
            box-shadow: 0 0 30px var(--secondary-glow);
            z-index: 50;
        }

        /* LIGHTBOX */
        #lightbox {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 10000;
            cursor: zoom-out;
            backdrop-filter: blur(10px);
        }

        #lightbox img {
            max-width: 90%;
            max-height: 80%;
            border: 5px solid white;
            box-shadow: 0 0 50px var(--primary-glow);
            border-radius: 10px;
        }

        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            padding: 10px 20px;
            background: var(--glass);
            border: 1px solid white;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            z-index: 100;
        }
    </style>
</head>
<body>

    <a href="index.html" class="back-btn">← Back to Sanctuary</a>
    <div id="cursor"></div>

    <!-- BACKGROUND MUSIC -->
    <audio id="bgMusic" loop>
        <source src="videoplayback.weba" type="audio/webm">
        Your browser does not support the audio element.
    </audio>

    <div id="space-bg">
        <div class="nebula nebula-1"></div>
        <div class="nebula nebula-2"></div>
        <div id="star-field"></div>
    </div>

    <!-- 1. SELECTION SCREEN -->
    <div id="selection-screen">
        <h1 class="selection-title">Which portal will you enter?</h1>
        
        <div class="choice-btn btn-holy" onclick="showGallery('holy')">
            The Holy Pictures ✨😍
        </div>

        <div class="secret-link" onclick="showGallery('hell')">
            The Hell itself 💀☠ (sry....)
        </div>
    </div>

    <!-- 2. GALLERY VIEW -->
    <div id="gallery-view">
        <h1 id="gallery-title" class="gallery-title"></h1>
        <div class="gallery-grid" id="gallery"></div>
    </div>

    <!-- LIGHTBOX -->
    <div id="lightbox" onclick="closeImage()">
        <img src="" id="fullImage">
    </div>

    <script>
        // --- CURSOR ---
        const cursor = document.getElementById('cursor');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // --- BACKGROUND STARS ---
        function createStars() {
            const field = document.getElementById('star-field');
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                const size = Math.random() * 3 + 'px';
                star.style.width = size;
                star.style.height = size;
                star.style.top = Math.random() * 100 + 'vh';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.setProperty('--duration', Math.random() * 3 + 2 + 's');
                field.appendChild(star);
            }
        }
        createStars();

        // --- GALLERY LOGIC ---
        function showGallery(type) {
            // START MUSIC HERE (Triggered by user interaction)
            const music = document.getElementById('bgMusic');
            music.play().catch(error => console.log("Music playback failed: ", error));

            document.getElementById('selection-screen').style.display = 'none';
            const view = document.getElementById('gallery-view');
            view.style.display = 'block';

            const title = document.getElementById('gallery-title');
            const grid = document.getElementById('gallery');
            grid.innerHTML = "";

            if (type === 'holy') {
                title.innerText = "The Holy Pictures ✨";
                for(let i=1; i<=10; i++) { 
                    createPolaroid(`${i}.jpeg`, `Angel Image #${i} ✨`);
                }
            } else {
                title.innerText = "The Hell Itself 💀";
                const letters = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");
                letters.forEach((letter, index) => {
                    if(index < 10) { 
                        createPolaroid(`${letter}.jpeg`, `Chaotic Entry #${letter} 🤣`);
                    }
                });
            }
        }

        function createPolaroid(src, caption) {
            const grid = document.getElementById('gallery');
            const polaroid = document.createElement('div');
            polaroid.className = 'polaroid';
            polaroid.innerHTML = `
                <img src="${src}" onerror="this.src='https://via.placeholder.com/200x200?text=Photo+Coming+Soon'">
                <p>${caption}</p>
            `;
            polaroid.onclick = () => openImage(src);
            grid.appendChild(polaroid);
        }

        function openImage(src) {
            const lb = document.getElementById('lightbox');
            const img = document.getElementById('fullImage');
            img.src = src;
            lb.style.display = 'flex';
        }

        function closeImage() {
            document.getElementById('lightbox').style.display = 'none';
        }
    </script>
</body>
</html>
