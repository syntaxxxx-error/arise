<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>How Well U Know me? ✨</title>
    <style>
        :root {
            --bg-color: #0a0a0c;
            --neon-pink: #ff00ff;
            --neon-blue: #00ffff;
            --neon-purple: #bc13fe;
            --text-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        /* --- ANIMATED BACKGROUND --- */
        .background-animate {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #1a1a2e 0%, #0a0a0c 100%);
        }

        .orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 10s infinite alternate ease-in-out;
        }

        .orb-1 { width: 300px; height: 300px; background: var(--neon-pink); top: -10%; left: -10%; }
        .orb-2 { width: 400px; height: 400px; background: var(--neon-blue); bottom: -10%; right: -10%; animation-delay: 2s; }
        .orb-3 { width: 250px; height: 250px; background: var(--neon-purple); top: 40%; left: 30%; animation-delay: 4s; }

        @keyframes float {
            from { transform: translate(0, 0) scale(1); }
            to { transform: translate(50px, 100px) scale(1.2); }
        }

        /* --- FLYING EMOJIS --- */
        .emoji {
            position: absolute;
            bottom: -50px;
            font-size: 24px;
            user-select: none;
            pointer-events: none;
            z-index: 0;
            animation: flyUp linear forwards;
        }

        @keyframes flyUp {
            to {
                transform: translateY(-110vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* --- START SCREEN --- */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: 0.8s ease-out;
            text-align: center;
            padding: 20px;
        }

        #start-screen h2 {
            font-size: 2.2em;
            margin-bottom: 20px;
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* --- QUIZ CONTAINER --- */
        .quiz-container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 2px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 30px;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5), 0 0 40px rgba(188, 19, 254, 0.2);
            width: 90%;
            max-width: 500px;
            position: relative;
            z-index: 1;
            text-align: center;
            display: none; 
        }

        h1 {
            font-size: 2em;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #fff;
            text-shadow: 0 0 10px var(--neon-blue), 0 0 20px var(--neon-blue);
        }

        .progress-container {
            width: 100%;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        #progress-bar {
            width: 20%;
            height: 100%;
            background: linear-gradient(to right, var(--neon-pink), var(--neon-blue));
            box-shadow: 0 0 10px var(--neon-pink);
            transition: width 0.4s ease;
        }

        .step {
            display: none;
            animation: fadeIn 0.5s ease forwards;
        }

        .step.active { display: block; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        label {
            display: block;
            font-size: 1.2em;
            margin-bottom: 20px;
            font-weight: 500;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px;
            background: rgba(0,0,0,0.3);
            border: 2px solid var(--neon-purple);
            border-radius: 15px;
            color: white;
            font-size: 1em;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
            text-align: center;
        }

        input[type="text"]:focus {
            box-shadow: 0 0 15px var(--neon-purple);
            border-color: #fff;
        }

        .options {
            display: grid;
            gap: 15px;
            margin-bottom: 20px;
        }

        .option {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
        }

        .option:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        .option input { display: none; }

        .option.selected {
            background: var(--neon-blue);
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 20px var(--neon-blue);
            border-color: transparent;
        }

        button {
            padding: 15px 40px;
            font-size: 1.1em;
            font-weight: bold;
            text-transform: uppercase;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            background: linear-gradient(45deg, var(--neon-pink), var(--neon-purple));
            color: white;
            box-shadow: 0 0 15px var(--neon-pink);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 25px var(--neon-pink), 0 0 40px var(--neon-purple);
        }

        .footer {
            margin-top: 20px;
            font-size: 0.8em;
            opacity: 0.6;
        }
    </style>
</head>
<body>

    <!-- BACKGROUND MUSIC -->
    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="start-screen">
        <h2>Lets see how well you know about me👀👀</h2>
        <button onclick="startQuiz()">Start Quiz ❤️</button>
    </div>

    <div class="background-animate">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="quiz-container" id="main-container">
        <h1>How Well U Know me</h1>
        
        <div class="progress-container">
            <div id="progress-bar"></div>
        </div>

        <!-- INTEGRATED FORMSPREE ID -->
        <form id="quizForm" action="https://formspree.io/f/mojpygjz" method="POST">
            
            <!-- REDIRECT TO YOUR GITHUB PAGE AFTER SUBMISSION -->
            <input type="hidden" name="_next" value="https://syntaxxxx-error.github.io/sanju-bday3/">

            <!-- Question 1 -->
            <div class="step active" id="step1">
                <label>Whats my fav Color? 🎨</label>
                <div class="options">
                    <label class="option"><input type="radio" name="Fav_Color" value="Red" required> Red</label>
                    <label class="option"><input type="radio" name="Fav_Color" value="Blue"> Blue</label>
                    <label class="option"><input type="radio" name="Fav_Color" value="Green"> Green</label>
                    <label class="option"><input type="radio" name="Fav_Color" value="Black"> Black</label>
                </div>
                <div class="btn-container">
                    <button type="button" onclick="nextStep(2)">Next ➔</button>
                </div>
            </div>

            <!-- Question 2 -->
            <div class="step" id="step2">
                <label>My fav animal? 🐾</label>
                <div class="options">
                    <label class="option"><input type="radio" name="Fav_Animal" value="Dog" required> Dog</label>
                    <label class="option"><input type="radio" name="Fav_Animal" value="Cat"> Cat</label>
                    <label class="option"><input type="radio" name="Fav_Animal" value="Horse"> Horse</label>
                    <label class="option"><input type="radio" name="Fav_Animal" value="Lion"> Lion</label>
                </div>
                <div class="btn-container">
                    <button type="button" onclick="nextStep(3)">Next ➔</button>
                </div>
            </div>

            <!-- Question 3 -->
            <div class="step" id="step3">
                <label>When is my birthday? 🎂</label>
                <input type="text" name="Birthday" placeholder="DD/MM/YYYY" required>
                <div class="btn-container">
                    <button type="button" onclick="nextStep(4)">Next ➔</button>
                </div>
            </div>

            <!-- Question 4 -->
            <div class="step" id="step4">
                <label>My fav nickname to call you 😍😋</label>
                <div class="options">
                    <label class="option"><input type="radio" name="Nickname" value="Sanjuuu" required> Sanjuuu</label>
                    <label class="option"><input type="radio" name="Nickname" value="Little Kitty"> Little Kitty</label>
                    <label class="option"><input type="radio" name="Nickname" value="Shortyyyy ^-^"> Shortyyyy ^-^</label>
                    <label class="option"><input type="radio" name="Nickname" value="M'lady"> M'lady</label>
                </div>
                <div class="btn-container">
                    <button type="button" onclick="nextStep(5)">Next ➔</button>
                </div>
            </div>

            <!-- Question 5 -->
            <div class="step" id="step5">
                <label>Who's the Smartest, Strongest & Handsomest guy ever? 💀</label>
                <div class="options">
                    <label class="option"><input type="radio" name="WhoIsTheBest" value="Om" required> Om 😺</label>
                    <label class="option"><input type="radio" name="WhoIsTheBest" value="Om The Great"> Om The Great 🐱‍👤</label>
                    <label class="option"><input type="radio" name="WhoIsTheBest" value="Om Duniya ka papa"> Om Duniya ka papa 💀</label>
                    <label class="option"><input type="radio" name="WhoIsTheBest" value="Someone else"> Someone else... T-T</label>
                </div>
                <div class="btn-container">
                    <button type="submit">Submit to Om! ❤️</button>
                </div>
            </div>

        </form>

        <div class="footer">Powered by (^///^) </div>
    </div>

    <script>
        function startQuiz() {
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('main-container').style.display = 'block';
            }, 800);

            const music = document.getElementById('bgMusic');
            music.play().catch(e => console.log("Music playback failed"));

            setInterval(createEmoji, 300);
        }

        function createEmoji() {
            const emojis = ['❤️', '✨', '🐱', '🌸', '⭐', '☁️', '🍭'];
            const emoji = document.createElement('div');
            emoji.classList.add('emoji');
            emoji.innerText = emojis[Math.floor(Math.random() * emojis.length)];
            emoji.style.left = Math.random() * 100 + 'vw';
            emoji.style.animationDuration = (Math.random() * 3 + 3) + 's'; 
            emoji.style.opacity = Math.random();
            document.body.appendChild(emoji);

            setTimeout(() => { emoji.remove(); }, 6000);
        }

        const options = document.querySelectorAll('.option');
        options.forEach(option => {
            option.addEventListener('click', function() {
                const group = this.querySelector('input').name;
                document.querySelectorAll(`.option`).forEach(opt => {
                    if(opt.querySelector('input').name === group) {
                        opt.classList.remove('selected');
                    }
                });
                this.classList.add('selected');
                this.querySelector('input').checked = true;
            });
        });

        function nextStep(stepNumber) {
            const activeStep = document.querySelector('.step.active');
            const inputs = activeStep.querySelectorAll('input');
            let valid = true;

            inputs.forEach(input => {
                if (input.type === 'text' && input.value.trim() === '') valid = false;
                if (input.type === 'radio') {
                    const name = input.name;
                    if (!document.querySelector(`input[name="${name}"]:checked`)) valid = false;
                }
            });

            if (!valid) {
                alert("Don't try to skip! Answer the question first 😺");
                return;
            }

            document.querySelectorAll('.step').forEach(step => step.classList.remove('active'));
            document.getElementById('step' + stepNumber).classList.add('active');

            // Updated progress bar calculation for 5 questions
            const progress = (stepNumber / 5) * 100;
            document.getElementById('progress-bar').style.width = progress + '%';
        }
    </script>
</body>
</html>
